name: Build Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Set up Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.15.0'
        cache: 'npm'
        check-latest: false
    
    - name: Verify Node.js version
      run: |
        node -v
        npm -v
    
    - name: Disable .nvmrc override
      run: rm -f .nvmrc .node-version
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build web assets
      run: npm run build
      env:
        CI: true
    
    - name: Sync Capacitor Android project
      run: npm exec cap sync android
    
    - name: Verify generated files
      run: ls -la android/capacitor-cordova-android-plugins/ || echo "Directory not found"
    
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    
    - name: Check Gradle wrapper
      run: |
        ls -la android/gradlew
        file android/gradlew
    
    - name: Check Android project structure
      run: |
        ls -la android/
        ls -la android/app/
        cat android/build.gradle
    
    - name: Build APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon --stacktrace
      env:
        NODE_OPTIONS: --max-old-space-size=4096
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: clawreader-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
